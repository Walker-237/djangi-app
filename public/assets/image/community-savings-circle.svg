<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1000" viewBox="0 0 1440 1000" role="img" aria-labelledby="title desc">
  <title id="title">Community savings circle</title>
  <desc id="desc">A warm illustration of Djangi members gathered around a shared contribution circle with a mobile wallet.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
