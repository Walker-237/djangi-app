<div class="flex min-h-screen max-w-full overflow-x-hidden bg-[#F7F3ED]">

  <!-- ── DESKTOP SIDE NAV ── -->
  <aside class="hidden lg:flex flex-col w-60 bg-[#1B3A2D] text-white px-4 py-6 gap-1">
    <div class="flex items-center gap-2 px-2 mb-8">
      <img src="/assets/image/logo.png" alt="Nkap Link" class="h-8 w-auto" />
    </div>

    @for (item of navItems; track item.path) {
      <a
        [routerLink]="item.path"
        routerLinkActive="bg-white/10 text-white font-semibold"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-white/70 hover:bg-white/5 hover:text-white transition-colors"
      >
        <lucide-icon [name]="item.iconName" [size]="18" aria-hidden="true"></lucide-icon>
        {{ navLabel()(item) }}
      </a>
    }

    <div class="flex-1"></div>

    <div class="flex items-center gap-1 text-xs text-white/50 px-2 pt-4 border-t border-white/10">
      <lucide-icon name="globe-2" [size]="13" aria-hidden="true"></lucide-icon>
      <button
        type="button"
        (click)="setLanguage('en')"
        class="px-2 py-1 rounded font-medium transition-colors"
        [class.text-white]="language() === 'en'"
        [class.font-semibold]="language() === 'en'"
      >EN</button>
      <span>/</span>
      <button
        type="button"
        (click)="setLanguage('fr')"
        class="px-2 py-1 rounded font-medium transition-colors"
        [class.text-white]="language() === 'fr'"
        [class.font-semibold]="language() === 'fr'"
      >FR</button>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main class="flex min-h-screen min-w-0 flex-1 flex-col overflow-x-hidden pb-16 lg:pb-0">
    <router-outlet></router-outlet>
  </main>

</div>
