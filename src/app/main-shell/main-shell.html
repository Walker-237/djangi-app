<div class="flex min-h-screen max-w-full overflow-hidden bg-[#F7F3ED]">
  <aside class="hidden lg:flex fixed inset-y-0 left-0 w-64 flex-col bg-[#1B3A2D] px-4 py-6 text-white">
    <a routerLink="/app/dashboard" class="mb-8 flex items-center gap-2 px-2" aria-label="Djangi">
      <img src="/assets/image/logo.png" alt="Djangi" class="h-10 w-auto" />
    </a>

    <nav class="flex flex-col gap-1" aria-label="Main navigation">
      @for (item of navItems; track item.path) {
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-white/10 text-white font-semibold"
          [routerLinkActiveOptions]="{ exact: item.path === '/app/dashboard' }"
          class="flex items-center gap-3 rounded-xl px-3 py-3 text-sm text-white/70 transition-colors hover:bg-white/5 hover:text-white"
        >
          <lucide-icon [name]="item.iconName" [size]="18" aria-hidden="true"></lucide-icon>
          {{ navLabel()(item) }}
        </a>
      }
    </nav>

    <div class="mt-auto border-t border-white/10 pt-4">
      <div class="mb-4 flex items-center gap-2 rounded-2xl bg-white/5 p-2">
        <span class="flex h-10 w-10 items-center justify-center rounded-full bg-[#C9A84C] text-sm font-bold text-[#1B3A2D]">
          {{ userInitials() }}
        </span>
        <span class="min-w-0">
          <span class="block truncate text-sm font-semibold">{{ userName() }}</span>
          <span class="block truncate text-xs text-white/50">{{ userRole() }}</span>
        </span>
      </div>

      <div class="mb-3 flex items-center gap-1 px-2 text-xs text-white/55">
        <lucide-icon name="globe-2" [size]="14" aria-hidden="true"></lucide-icon>
        <button
          type="button"
          (click)="setLanguage('en')"
          class="rounded px-2 py-1 font-semibold transition-colors"
          [class.text-white]="language() === 'en'"
        >EN</button>
        <span>/</span>
        <button
          type="button"
          (click)="setLanguage('fr')"
          class="rounded px-2 py-1 font-semibold transition-colors"
          [class.text-white]="language() === 'fr'"
        >FR</button>
      </div>

      <button
        type="button"
        class="flex w-full items-center gap-3 rounded-xl px-3 py-3 text-sm font-semibold text-white/70 transition-colors hover:bg-white/5 hover:text-white"
        (click)="logout()"
      >
        <lucide-icon name="log-out" [size]="18" aria-hidden="true"></lucide-icon>
        {{ labels().logout }}
      </button>
    </div>
  </aside>

  <div class="flex min-h-screen min-w-0 flex-1 flex-col lg:ml-64">
    <header class="hidden h-14 shrink-0 items-center justify-between border-b border-[#E5DDD3] bg-[#F7F3ED]/95 px-6 lg:flex">
      <h1 class="text-xl font-bold text-[#1B3A2D]">{{ pageTitle() }}</h1>
      <div class="flex items-center gap-3">
        <a
          routerLink="/app/notifications"
          class="relative flex h-10 w-10 items-center justify-center rounded-full bg-white text-[#1B3A2D] shadow-sm"
          [attr.aria-label]="labels().notifications"
        >
          <lucide-icon name="bell" [size]="18" aria-hidden="true"></lucide-icon>
          @if (unreadNotifCount() > 0) {
            <span class="absolute -right-1 -top-1 flex h-5 min-w-5 items-center justify-center rounded-full bg-[#C0392B] px-1 text-[11px] font-bold text-white">
              {{ unreadNotifCount() }}
            </span>
          }
        </a>
        <a
          routerLink="/app/profile"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-[#1B3A2D] text-sm font-bold text-white"
          aria-label="Profile"
        >
          {{ userInitials() }}
        </a>
      </div>
    </header>

    <main class="min-h-0 flex-1 overflow-y-auto overflow-x-hidden pb-20 lg:pb-0">
      <router-outlet></router-outlet>
    </main>
  </div>

  <app-nav-bar></app-nav-bar>
</div>
