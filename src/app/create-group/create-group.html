<div class="cg-wrap">

  <!-- ── HEADER ── -->
  <header class="cg-header">
    <button type="button" (click)="goBack()" class="cg-back-btn">
      <lucide-icon name="arrow-left" [size]="20"></lucide-icon>
    </button>
    <h1 class="cg-title">{{ language() === 'fr' ? 'Créer un groupe' : 'Create group' }}</h1>
    <div></div>
  </header>

  <!-- ── FORM ── -->
  <form (ngSubmit)="onSubmit()" class="cg-form">

    <!-- Community -->
    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Communauté' : 'Community' }}</label>
      <input
        type="text"
        [value]="communityId()"
        class="cg-input"
        readonly
      />
    </div>

  <!-- Group name -->
    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Nom du groupe' : 'Group name' }}</label>
      <input
        type="text"
        [(ngModel)]="groupName"
        name="groupName"
        [placeholder]="language() === 'fr' ? 'ex. Épargne du quartier' : 'ex. Neighborhood savings'"
        class="cg-input"
        required
      />
    </div>

    <!-- Description -->
    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Description' : 'Description' }}</label>
      <textarea
        [(ngModel)]="description"
        name="description"
        [placeholder]="language() === 'fr' ? 'Décrivez votre groupe...' : 'Describe your group...'"
        class="cg-input cg-textarea"
        required
      ></textarea>
    </div>

    <!-- Frequency -->
    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Fréquence' : 'Frequency' }}</label>
      <div class="cg-select-wrap">
        <select [(ngModel)]="frequency" name="frequency" class="cg-select">
          @for (freq of frequencies; track freq) {
            <option [value]="freq">{{ frequencyLabel(freq) }}</option>
          }
        </select>
        <lucide-icon name="chevron-down" [size]="16" class="cg-select-icon"></lucide-icon>
      </div>
    </div>

    <!-- Contribution amount -->
    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Montant de contribution' : 'Contribution amount' }}</label>
      <div class="cg-input-group">
        <input
          type="number"
          [(ngModel)]="contributionAmount"
          name="contributionAmount"
          [placeholder]="language() === 'fr' ? 'Montant' : 'Amount'"
          class="cg-input cg-input-number"
          required
        />
        <div class="cg-select-wrap cg-currency-select">
          <select [(ngModel)]="currency" name="currency" class="cg-select">
            @for (curr of currencies; track curr) {
              <option [value]="curr">{{ curr }}</option>
            }
          </select>
          <lucide-icon name="chevron-down" [size]="16" class="cg-select-icon"></lucide-icon>
        </div>
      </div>
    </div>

    <!-- Max members -->
    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Nombre maximum de membres' : 'Max members' }}</label>
      <input
        type="number"
        [(ngModel)]="maxMembers"
        name="maxMembers"
        [placeholder]="language() === 'fr' ? 'ex. 10' : 'ex. 10'"
        class="cg-input"
        min="2"
        max="100"
        required
      />
    </div>

  </form>

  <!-- ── SUBMIT BUTTON (fixed) ── -->
  <div class="cg-footer">
    <button type="submit" (click)="onSubmit()" class="cg-submit-btn">
      {{ language() === 'fr' ? 'Créer le groupe' : 'Create group' }}
    </button>
  </div>

</div>
