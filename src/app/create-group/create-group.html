<div class="cg-wrap" style="padding-bottom: 140px;">

  <header class="cg-header">
    <button type="button" (click)="goBack()" class="cg-back-btn">
      <lucide-icon name="arrow-left" [size]="20"></lucide-icon>
    </button>
    <h1 class="cg-title">{{ language() === 'fr' ? 'Creer un groupe' : 'Create group' }}</h1>
    <div></div>
  </header>

  <form (ngSubmit)="onSubmit()" class="cg-form">

    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Nom du groupe' : 'Group name' }}</label>
      <input type="text" [(ngModel)]="groupName" name="groupName"
        [placeholder]="language() === 'fr' ? 'ex. Epargne du quartier' : 'ex. Neighborhood savings'"
        class="cg-input" required />
    </div>

    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Description' : 'Description' }}</label>
      <textarea [(ngModel)]="description" name="description"
        [placeholder]="language() === 'fr' ? 'Decrivez votre groupe...' : 'Describe your group...'"
        class="cg-input cg-textarea"></textarea>
    </div>

    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Frequence' : 'Frequency' }}</label>
      <div class="cg-select-wrap">
        <select [(ngModel)]="frequency" name="frequency" class="cg-select">
          @for (freq of frequencies; track freq) {
            <option [value]="freq">{{ frequencyLabel(freq) }}</option>
          }
        </select>
        <lucide-icon name="chevron-down" [size]="16" class="cg-select-icon"></lucide-icon>
      </div>
    </div>

    <div class="cg-field">
      <label class="cg-label">{{ language() === 'fr' ? 'Montant de contribution' : 'Contribution amount' }}</label>
      <div class="cg-input-group">
        <input type="number" [(ngModel)]="contributionAmount" name="contributionAmount"
          [placeholder]="language() === 'fr' ? 'Montant' : 'Amount'"
          class="cg-input cg-input-number" required />
        <div class="cg-select-wrap cg-currency-select">
          <select [(ngModel)]="currency" name="currency" class="cg-select">
            @for (curr of currencies; track curr) {
              <option [value]="curr">{{ curr }}</option>
            }
          </select>
          <lucide-icon name="chevron-down" [size]="16" class="cg-select-icon"></lucide-icon>
        </div>
      </div>
    </div>

    @if (error()) {
      <p style="color:#DC2626;font-size:14px;font-weight:600;">{{ error() }}</p>
    }

  </form>

  <div class="cg-footer" style="position:fixed;bottom:70px;left:0;right:0;padding:16px 20px;background:#FAFAF8;border-top:1px solid #E5E7EB;z-index:50;">
    <button type="button" (click)="onSubmit()" [disabled]="loading()" class="cg-submit-btn" style="width:100%;">
      {{ loading() ? 'Creating...' : (language() === 'fr' ? 'Creer le groupe' : 'Create group') }}
    </button>
  </div>

</div>
